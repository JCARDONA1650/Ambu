{% extends "attendance/base.html" %}
{% load tz %}
{% block title %}Exportar nómina{% endblock %}

{% block content %}
{% localtime on %}

<h3 class="mb-4 text-danger">Exportar nómina a Excel</h3>

<div class="card bg-dark text-light border-danger shadow-sm">
  <div class="card-body">
    <form method="get" action="{% url 'payroll_export_xlsx' %}" class="row g-3">
      <div class="col-md-4">
        <label class="form-label fw-bold">Ámbito</label>
        {{ form.scope }}
      </div>
      <div class="col-md-4">
        <label class="form-label fw-bold">Proyecto (opcional)</label>
        {{ form.project }}
      </div>
      <div class="col-md-4">
        <label class="form-label fw-bold">Mes (para mes/quincena)</label>
        {{ form.month }}
      </div>
      <div class="col-md-3">
        <label class="form-label fw-bold">Año (para anual)</label>
        {{ form.year }}
      </div>
      <div class="col-md-3">
        <label class="form-label fw-bold">Quincena</label>
        {{ form.half }}
      </div>
      <div class="col-12 d-grid d-md-flex gap-2">
        <button class="btn btn-danger">Descargar XLSX</button>
        <a class="btn btn-outline-danger" href="{% url 'payroll_list' %}">Volver</a>
      </div>
    </form>
  </div>
</div>

{% endlocaltime %}
{% endblock %}
