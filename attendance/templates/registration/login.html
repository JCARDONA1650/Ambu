{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Iniciar sesión • UNAD PROYECTOS</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{
      --ambu-red:#dc3545;
      --ambu-red-dark:#c02e3c;
      --ambu-bg:#121417;
      --ambu-card:#1b1f24;
      --ambu-text:#e9ecef;
    }
    html,body{height:100%}
    body{
      background: radial-gradient(1200px 800px at 20% -10%, #1a1f26 0%, #121417 55%, #0f1216 100%);
      color:var(--ambu-text);
      display:flex; align-items:center; justify-content:center;
      padding:24px;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
    }

    /* Card */
    .login-card{
      background:linear-gradient(180deg, #1c2127 0%, #181c21 100%);
      border:1px solid rgba(255,255,255,.06);
      box-shadow:
        0 30px 60px rgba(0,0,0,.45),
        inset 0 1px 0 rgba(255,255,255,.03);
      border-radius:16px;
      overflow:hidden;
      max-width: 440px;
      width:100%;
    }

    .login-header{
      background:linear-gradient(135deg, var(--ambu-red) 0%, var(--ambu-red-dark) 100%);
      color:#fff;
      padding:18px 22px;
      display:flex; align-items:center; justify-content:center; gap:10px;
    }
    .brand-title{
      font-weight:800;
      letter-spacing:.4px;
      margin:0;
    }

    .logo-spin{
      width:32px; height:32px; border-radius:50%; background:#fff;
      display:inline-flex; align-items:center; justify-content:center;
      animation:spin 5s linear infinite;
      box-shadow:0 0 0 2px rgba(255,255,255,.25) inset;
      overflow:hidden;
    }
    .logo-spin img{width:28px;height:28px;object-fit:contain}
    @keyframes spin { from{transform:rotateY(0)} to{transform:rotateY(360deg)} }

    .login-body{ padding:22px; }

    /* Inputs */
    .form-control, .form-select{
      background:#0f1419; border:1px solid rgba(255,255,255,.1); color:var(--ambu-text);
      padding:12px 44px 12px 44px; border-radius:10px;
    }
    .form-control:focus, .form-select:focus{
      border-color:var(--ambu-red); box-shadow:0 0 0 .25rem rgba(220,53,69,.15); background:#0e1217; color:#fff;
    }
    .input-icon{
      position:relative;
    }
    .input-icon > .bi{
      position:absolute; left:12px; top:65%; transform:translateY(-50%); opacity:.7; color:#c9d1d9;
      pointer-events:none; font-size:18px;
    }
    .input-icon .toggle-pass{
      position:absolute; right:10px; top:65%; transform:translateY(-50%);
      background:transparent; border:0; color:#c9d1d9; opacity:.8;
    }
    .input-icon .toggle-pass:hover{opacity:1}

    .btn-ambu{
      background:var(--ambu-red); border-color:var(--ambu-red);
      padding:.8rem 1rem; font-weight:700; letter-spacing:.2px; border-radius:10px;
    }
    .btn-ambu:hover{ background:var(--ambu-red-dark); border-color:var(--ambu-red-dark) }
    .btn-ambu:active{ transform:translateY(1px) }

    .muted-link{ color:#f1aeb5; text-decoration:none }
    .muted-link:hover{ color:#fff; text-decoration:underline }

    .alert-compact{
      padding:.65rem .85rem; border-radius:10px; border:1px solid rgba(255,255,255,.08);
      background:#2a0f14; color:#ffd6db;
    }

    @media (max-width: 420px){
      .login-body{ padding:18px }
      .brand-title{ font-size:1.05rem }
    }
    .grupo-creditos{
  position: fixed;
  right: 20px;
  bottom: 20px;
  background: rgba(27,31,36,.92);
  border: 1px solid rgba(255,255,255,.10);
  color: #ffffff;
  padding: 12px 16px;
  border-radius: 14px;
  font-size: 13px;
  line-height: 1.5;
  text-align: left;
  box-shadow: 0 10px 30px rgba(0,0,0,.45);
  backdrop-filter: blur(6px);
  z-index: 9999;
  min-width: 220px;
}

.grupo-title{
  font-size: 15px;
  font-weight: 800;
  margin-bottom: 2px;
  color: #ffffff;
}

.grupo-subtitle{
  color: #f1aeb5;
  font-weight: 700;
  margin-bottom: 8px;
}
  </style>
</head>
<body>
  <main class="login-card">
    <header class="login-header">
      <span class="logo-spin">
        <img src="{% static 'img/LOGO_PERFIL_AMBU_GROUP.png' %}" alt="AmbuGroup">
      </span>
      <h2 class="brand-title">Gestor Negocios Informales</h2>
    </header>

    <section class="login-body">
      {% if form.errors %}
        <div class="alert alert-compact mb-3" role="alert">
          Usuario o contraseña inválidos.
        </div>
      {% endif %}

      <form method="post" novalidate>
        {% csrf_token %}

        <div class="mb-3 input-icon">
          <i class="bi bi-person"></i>
          <label class="form-label fw-semibold">Usuario</label>
          <input type="text" name="username" class="form-control" required autofocus>
        </div>

        <div class="mb-3 input-icon">
          <i class="bi bi-lock"></i>
          <label class="form-label fw-semibold">Contraseña</label>
          <input id="pass" type="password" name="password" class="form-control" required>
          <button type="button" class="toggle-pass" aria-label="Mostrar contraseña" onclick="togglePass()">
            <i class="bi bi-eye"></i>
          </button>
        </div>

        <button class="btn btn-ambu w-100 mb-2" type="submit">Ingresar</button>

        <p class="text-center mb-0">
          <a class="muted-link" href="#">¿Olvidaste tu contraseña?</a>
        </p>
      </form>
    </section>
  </main>

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <script>
    function togglePass(){
      const input = document.getElementById('pass');
      const btn   = event.currentTarget;
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      btn.innerHTML = isText ? '<i class="bi bi-eye"></i>' : '<i class="bi bi-eye-slash"></i>';
      btn.setAttribute('aria-label', isText ? 'Mostrar contraseña' : 'Ocultar contraseña');
    }
  </script>
  <div class="grupo-creditos">
  <div class="grupo-title">Grupo 88</div>
  <div class="grupo-subtitle">Estudiantes</div>
  <div>Jorge Cardona</div>
  <div>Gregory</div>
  <div>Juan Manuel Gutierrez</div>
  <div>Walther Alejandro Ferrucho</div>
</div>
</body>
</html>
